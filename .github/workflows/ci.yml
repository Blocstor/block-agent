name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  docker:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/blocstor/bloc-agent:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/blocstor/bloc-agent:{0}', github.ref_name) || '' }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: GOARCH=${{ matrix.goarch }} go build -o bloc-agent ./cmd/agent

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.38.0/nfpm_2.38.0_Linux_x86_64.tar.gz \
            | tar -xz nfpm
          sudo mv nfpm /usr/local/bin/nfpm

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          sed 's/arch: amd64/arch: ${{ matrix.arch }}/' nfpm.yaml > nfpm-build.yaml
          nfpm package --config nfpm-build.yaml --packager deb --target bloc-agent_${{ github.ref_name }}_${{ matrix.arch }}.deb
          nfpm package --config nfpm-build.yaml --packager rpm --target bloc-agent_${{ github.ref_name }}_${{ matrix.arch }}.rpm

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bloc-agent_${{ github.ref_name }}_${{ matrix.arch }}.deb
            bloc-agent_${{ github.ref_name }}_${{ matrix.arch }}.rpm
